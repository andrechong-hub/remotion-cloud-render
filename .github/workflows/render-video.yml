name: Render Remotion Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Composition ID to render'
        required: true
        default: 'HelloWorld'
      duration:
        description: 'Video duration in seconds'
        required: false
        default: '5'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome & FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser ffmpeg

      - name: Install dependencies
        run: |
          cd my-video
          npm install

      - name: Render video
        run: |
          cd my-video
          npx remotion render ${{ github.event.inputs.composition }} out/video.mp4
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: my-video/out/video.mp4
          retention-days: 1
